name: quarkus-spring-benchmark
http:
  host: http://localhost:8080
  sharedConnections: 200
phases:
  - warmup:
      constantRate:
        usersPerSec: 200
        duration: 60s
        scenario: &get-all
          - getAllStudents:
              - httpRequest:
                  GET: /students
  - get-small:
      always:
        users: 200
        startAfter: warmup
        duration: 30s
        scenario: *get-all
