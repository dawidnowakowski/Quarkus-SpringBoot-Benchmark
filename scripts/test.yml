name: get-capacity-benchmark
http:
  host: http://localhost:8080
  sharedConnections: 1000
  pipeliningLimit: 10
phases:
  - warmup-get:
      constantRate:
        usersPerSec: 1000
        duration: 60s
        scenario: &get-scenario
          - getStudent:
              - randomInt:
                  toVar: studentId
                  min: 1
                  max: 15
              - httpRequest:
                  GET: /students/${studentId}
                  headers:
                    Accept: application/json
  - measure-get-capacity:
      increasingRate:
        startAfter: warmup-get
        initialUsersPerSec: 1000
        targetUsersPerSec: 20000
        duration: 3m
        scenario: *get-scenario